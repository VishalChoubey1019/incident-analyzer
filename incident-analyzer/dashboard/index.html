<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incident Analyzer</title>
  <style>
    /* ── Reset + tokens ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --bg2:        #161b22;
      --bg3:        #21262d;
      --border:     #30363d;
      --border2:    #444c56;
      --text:       #e6edf3;
      --text2:      #8b949e;
      --text3:      #6e7681;

      --critical:   #ff6b6b;
      --critical-bg:#3d0f0f;
      --high:       #f0883e;
      --high-bg:    #3d1f06;
      --medium:     #d29922;
      --medium-bg:  #2e2000;
      --low:        #3fb950;
      --low-bg:     #0d2e15;

      --blue:       #58a6ff;
      --blue-bg:    #0c2340;
      --purple:     #a371f7;

      --radius:     6px;
      --radius-lg:  10px;
      font-size: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout ───────────────────────────────────────────────────────── */
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #f0883e, #ff6b6b);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--low);
      box-shadow: 0 0 6px var(--low);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.offline { background: var(--text3); box-shadow: none; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--text2);
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: calc(100vh - 56px);
    }

    /* ── Sidebar ──────────────────────────────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-weight: 600;
      font-size: 13px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .count-badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 10px;
    }

    .filters {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .filter-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--border2); color: var(--text); }
    .filter-btn.active {
      background: var(--blue-bg);
      border-color: var(--blue);
      color: var(--blue);
    }

    .incident-list {
      overflow-y: auto;
      flex: 1;
    }

    .incident-list::-webkit-scrollbar { width: 4px; }
    .incident-list::-webkit-scrollbar-track { background: transparent; }
    .incident-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── Incident card ────────────────────────────────────────────────── */
    .incident-card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .incident-card:hover { background: var(--bg2); }
    .incident-card.selected { background: var(--bg3); }
    .incident-card.selected::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--blue);
      border-radius: 0 2px 2px 0;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
    }

    .sev-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .sev-CRITICAL { background: var(--critical-bg); color: var(--critical); border: 1px solid var(--critical); }
    .sev-HIGH     { background: var(--high-bg);     color: var(--high);     border: 1px solid var(--high); }
    .sev-MEDIUM   { background: var(--medium-bg);   color: var(--medium);   border: 1px solid var(--medium); }
    .sev-LOW      { background: var(--low-bg);       color: var(--low);      border: 1px solid var(--low); }

    .card-service {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .card-service span {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text3);
      margin-top: 6px;
    }

    .status-chip {
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-OPEN          { background: rgba(248,81,73,0.15); color: #f85149; }
    .status-INVESTIGATING { background: rgba(210,153,34,0.15); color: var(--medium); }
    .status-RESOLVED      { background: rgba(63,185,80,0.15); color: var(--low); }

    /* new incident highlight */
    .incident-card.new-flash {
      animation: flashIn 0.6s ease-out;
    }

    @keyframes flashIn {
      0%   { background: rgba(88,166,255,0.2); }
      100% { background: transparent; }
    }

    /* ── Detail panel ─────────────────────────────────────────────────── */
    .detail-panel {
      overflow-y: auto;
      padding: 28px 32px;
    }

    .detail-panel::-webkit-scrollbar { width: 4px; }
    .detail-panel::-webkit-scrollbar-track { background: transparent; }
    .detail-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text3);
      gap: 12px;
    }

    .empty-icon { font-size: 40px; }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .detail-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      flex: 1;
    }

    .detail-badges {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .detail-meta {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .meta-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .meta-value {
      font-size: 13px;
      color: var(--text);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    /* ── RCA section ──────────────────────────────────────────────────── */
    .section {
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .rca-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .rca-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text2);
      font-size: 13px;
      padding: 12px 0;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .rca-summary {
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .rca-cause-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .rca-cause {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .confidence-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .confidence-label { font-size: 11px; color: var(--text3); width: 80px; }
    .confidence-bar {
      flex: 1;
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--blue);
      transition: width 0.6s ease;
    }
    .confidence-pct { font-size: 12px; color: var(--text2); font-weight: 600; width: 32px; text-align: right; }

    .recommendations { list-style: none; }

    .recommendation {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
      border-bottom: 1px solid var(--border);
    }

    .recommendation:last-child { border-bottom: none; }

    .rec-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--text3);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Event list ───────────────────────────────────────────────────── */
    .event-list { list-style: none; }

    .event-item {
      display: flex;
      gap: 10px;
      padding: 7px 0;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }

    .event-item:last-child { border-bottom: none; }

    .event-id {
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text3);
      font-size: 11px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    /* ── Re-trigger button ────────────────────────────────────────────── */
    .btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 13px;
      padding: 7px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn:hover { background: var(--bg2); border-color: var(--blue); color: var(--blue); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-sm {
      font-size: 12px;
      padding: 4px 10px;
    }

    /* ── Stats bar ────────────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat + .stat {
      border-left: 1px solid var(--border);
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.crit { color: var(--critical); }
    .stat-value.high { color: var(--high); }

    .stat-label {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* ── Toast ────────────────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
    }

    .toast {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--blue);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text);
      max-width: 320px;
      animation: slideIn 0.25s ease-out;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .toast.error { border-left-color: var(--critical); }
    .toast.success { border-left-color: var(--low); }

    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);   opacity: 1; }
    }
  </style>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      Incident Analyzer
    </div>
    <div class="status-dot" id="status-dot"></div>
    <span style="font-size:12px;color:var(--text3)" id="status-text">connecting…</span>
  </div>
  <div class="topbar-right">
    <span id="last-refresh">—</span>
    <button class="btn btn-sm" onclick="loadIncidents()">↻ Refresh</button>
  </div>
</header>

<!-- ── Layout ──────────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value crit" id="stat-critical">0</div>
        <div class="stat-label">Critical</div>
      </div>
      <div class="stat">
        <div class="stat-value high" id="stat-high">0</div>
        <div class="stat-label">High</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
    </div>

    <!-- Header + filters -->
    <div class="sidebar-header">
      <span class="sidebar-title">Incidents</span>
      <span class="count-badge" id="list-count">0</span>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all"      onclick="setFilter('all',this)">All</button>
      <button class="filter-btn"        data-filter="OPEN"     onclick="setFilter('OPEN',this)">Open</button>
      <button class="filter-btn"        data-filter="INVESTIGATING" onclick="setFilter('INVESTIGATING',this)">Investigating</button>
      <button class="filter-btn"        data-filter="RESOLVED" onclick="setFilter('RESOLVED',this)">Resolved</button>
    </div>

    <!-- List -->
    <div class="incident-list" id="incident-list">
      <div style="padding:24px 16px;color:var(--text3);font-size:13px;text-align:center">
        Loading incidents…
      </div>
    </div>
  </aside>

  <!-- Detail panel -->
  <main class="detail-panel" id="detail-panel">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div style="font-size:15px;font-weight:500;color:var(--text2)">No incident selected</div>
      <div style="font-size:13px;color:var(--text3);max-width:260px;text-align:center">
        Select an incident from the list to view its AI-generated root cause analysis.
      </div>
    </div>
  </main>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>


<script>
// ── Config ──────────────────────────────────────────────────────────────
// The dashboard talks to a tiny JSON HTTP shim in front of the gRPC API.
// See api-server/http_bridge.py — runs on :8082.
const API_BASE = "http://localhost:8082";

let allIncidents  = [];
let selectedId    = null;
let currentFilter = "all";
let pollTimer     = null;


// ── Toast notifications ─────────────────────────────────────────────────
function toast(msg, type = "info", duration = 4000) {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => el.remove(), duration);
}


// ── Fetch incidents from the HTTP bridge ─────────────────────────────────
async function loadIncidents() {
  try {
    const res  = await fetch(`${API_BASE}/incidents?page=1&page_size=50`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const newIds = new Set((data.incidents || []).map(i => i.id));
    const oldIds = new Set(allIncidents.map(i => i.id));
    const added  = [...newIds].filter(id => !oldIds.has(id));

    allIncidents = data.incidents || [];
    renderList(added);
    updateStats();
    setConnected(true);

    document.getElementById("last-refresh").textContent =
      "Updated " + new Date().toLocaleTimeString();

    if (added.length > 0) {
      toast(`${added.length} new incident${added.length > 1 ? "s" : ""} arrived`, "info");
    }
  } catch (e) {
    setConnected(false);
  }
}


function setConnected(ok) {
  const dot  = document.getElementById("status-dot");
  const txt  = document.getElementById("status-text");
  dot.className = "status-dot" + (ok ? "" : " offline");
  txt.textContent = ok ? "live" : "API offline";
}


// ── Render sidebar list ──────────────────────────────────────────────────
function renderList(flashIds = []) {
  const filtered = currentFilter === "all"
    ? allIncidents
    : allIncidents.filter(i => i.status === currentFilter);

  document.getElementById("list-count").textContent = filtered.length;

  if (filtered.length === 0) {
    document.getElementById("incident-list").innerHTML =
      `<div style="padding:24px 16px;color:var(--text3);font-size:13px;text-align:center">No incidents found.</div>`;
    return;
  }

  const html = filtered.map(inc => {
    const isNew = flashIds.includes(inc.id);
    const age   = formatAge(inc.startedAt || inc.started_at);
    return `
      <div class="incident-card ${selectedId === inc.id ? "selected" : ""} ${isNew ? "new-flash" : ""}"
           onclick="selectIncident('${inc.id}')">
        <div class="card-top">
          <div class="card-title">${escHtml(inc.title)}</div>
          <span class="sev-badge sev-${inc.severity}">${inc.severity}</span>
        </div>
        <div class="card-service"><span>${escHtml(inc.service)}</span></div>
        <div class="card-meta">
          <span class="status-chip status-${inc.status}">${inc.status}</span>
          <span>${age}</span>
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("incident-list").innerHTML = html;
}


function updateStats() {
  const crit  = allIncidents.filter(i => i.severity === "CRITICAL" && i.status !== "RESOLVED").length;
  const high  = allIncidents.filter(i => i.severity === "HIGH"     && i.status !== "RESOLVED").length;
  document.getElementById("stat-critical").textContent = crit;
  document.getElementById("stat-high").textContent     = high;
  document.getElementById("stat-total").textContent    = allIncidents.length;
}


function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderList();
}


// ── Incident detail view ─────────────────────────────────────────────────
function selectIncident(id) {
  selectedId = id;
  renderList();

  const inc = allIncidents.find(i => i.id === id);
  if (!inc) return;

  const panel = document.getElementById("detail-panel");

  const rca   = inc.rca || {};
  const recs  = rca.recommendations || [];
  const conf  = Math.round((rca.confidence_score || 0) * 100);

  const rcaHtml = rca.summary
    ? `
      <div class="rca-summary">${escHtml(rca.summary)}</div>
      <div class="rca-cause-label">Likely cause</div>
      <div class="rca-cause">${escHtml(rca.likely_cause || "—")}</div>
      <div class="confidence-bar-wrap">
        <div class="confidence-label">Confidence</div>
        <div class="confidence-bar"><div class="confidence-fill" style="width:${conf}%"></div></div>
        <div class="confidence-pct">${conf}%</div>
      </div>
      <ul class="recommendations">
        ${recs.map((r, i) => `
          <li class="recommendation">
            <span class="rec-num">${i + 1}</span>
            <span>${escHtml(r)}</span>
          </li>
        `).join("")}
      </ul>
    `
    : `<div class="rca-loading"><div class="spinner"></div>AI analysis in progress…</div>`;

  const relIds = (inc.relatedEventIds || inc.related_event_ids || []);
  const eventsHtml = relIds.length > 0
    ? `<ul class="event-list">${
        relIds.slice(0, 8).map(eid =>
          `<li class="event-item"><span class="event-id">${escHtml(eid.slice(0,8))}…</span></li>`
        ).join("")
      }</ul>`
    : `<span style="color:var(--text3);font-size:13px">None recorded</span>`;

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${escHtml(inc.title)}</div>
      <div class="detail-badges">
        <span class="sev-badge sev-${inc.severity}">${inc.severity}</span>
        <span class="status-chip status-${inc.status}">${inc.status}</span>
      </div>
    </div>

    <div class="detail-meta">
      <div class="meta-item">
        <span class="meta-label">Service</span>
        <span class="meta-value">${escHtml(inc.service)}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Incident ID</span>
        <span class="meta-value" style="font-size:11px">${escHtml(inc.id)}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Started</span>
        <span class="meta-value">${formatTs(inc.startedAt || inc.started_at)}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Last updated</span>
        <span class="meta-value">${formatTs(inc.updatedAt || inc.updated_at)}</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Description</div>
      <p style="font-size:14px;color:var(--text2);line-height:1.7">${escHtml(inc.description || "No description.")}</p>
    </div>

    <div class="section">
      <div class="section-title" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px">
          ✦ Root cause analysis
          <span style="flex:1;height:1px;background:var(--border);display:inline-block;width:60px"></span>
        </span>
        <button class="btn btn-sm" onclick="retriggerRca('${inc.id}', this)">
          ↻ Re-analyse
        </button>
      </div>
      <div class="rca-card">${rcaHtml}</div>
    </div>

    <div class="section">
      <div class="section-title">Related events (${relIds.length})</div>
      ${eventsHtml}
    </div>
  `;
}


async function retriggerRca(id, btn) {
  btn.disabled = true;
  btn.textContent = "Queuing…";
  try {
    const res = await fetch(`${API_BASE}/incidents/${id}/analyse`, { method: "POST" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    toast("Re-analysis queued — refresh in a moment", "success");
    btn.textContent = "Queued ✓";
    setTimeout(() => { btn.disabled = false; btn.textContent = "↻ Re-analyse"; }, 5000);
  } catch (e) {
    toast("Failed to queue re-analysis: " + e.message, "error");
    btn.disabled = false;
    btn.textContent = "↻ Re-analyse";
  }
}


// ── Utilities ────────────────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return "";
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function formatAge(ms) {
  if (!ms) return "—";
  const secs = Math.floor((Date.now() - ms) / 1000);
  if (secs < 60)   return `${secs}s ago`;
  if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs / 3600)}h ago`;
  return `${Math.floor(secs / 86400)}d ago`;
}

function formatTs(ms) {
  if (!ms) return "—";
  return new Date(ms).toLocaleString("en-US", {
    month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit", second: "2-digit",
  });
}


// ── Bootstrap ────────────────────────────────────────────────────────────
loadIncidents();
// poll every 15 seconds — good enough for a side project
pollTimer = setInterval(loadIncidents, 15_000);
</script>
